<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXORA Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    .header h1 { font-size: 42px; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.3s;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-block;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-right: 10px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover { background: #059669; }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover { background: #dc2626; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-weight: 600;
    }
    .preview {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      background: #f9fafb;
    }
    .preview h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 20px;
    }
    .preview .product-info {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      margin-bottom: 15px;
    }
    .preview img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .preview .info-text h4 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #111;
    }
    .preview .info-text p {
      margin: 6px 0;
      color: #555;
      font-size: 14px;
    }
    .preview .price {
      font-size: 24px;
      font-weight: bold;
      color: #e44d26;
    }
    .preview .rating {
      color: #f5a623;
      font-size: 16px;
    }
    .alert {
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
    .products-list {
      margin-top: 20px;
    }
    .product-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .product-item:last-child { border-bottom: none; }
    .product-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 15px;
    }
    .product-item-info {
      flex: 1;
    }
    .product-item-info h4 {
      font-size: 15px;
      margin-bottom: 4px;
      color: #333;
    }
    .product-item-info p {
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 NEXORA Admin Panel</h1>
      <p>Add Amazon products to your affiliate store instantly</p>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 20px; color: #333;">➕ Add New Product</h2>
      
      <div id="alert" style="display:none;" class="alert"></div>

      <div class="input-group">
        <label for="amazonUrl">Amazon Product URL</label>
        <input
          type="text"
          id="amazonUrl"
          placeholder="https://www.amazon.com/dp/B0FXNXR46R..."
        />
      </div>

      <button id="scrapeBtn" class="btn btn-primary" onclick="scrapeProduct()">
        🔍 Fetch Product Data
      </button>

      <div id="preview" class="preview" style="display:none;">
        <h3>Product Preview</h3>
        <div class="product-info">
          <div>
            <img id="previewImg" src="" alt="Product" />
          </div>
          <div class="info-text">
            <h4 id="previewTitle"></h4>
            <p class="price" id="previewPrice"></p>
            <p class="rating" id="previewRating"></p>
            <p style="font-size: 13px; color: #888; margin-top: 10px;">ASIN: <strong id="previewAsin"></strong></p>
          </div>
        </div>

        <div class="input-group" style="margin-top: 20px;">
          <label for="category">Category</label>
          <select id="category">
            <option value="featured">Featured Products</option>
            <option value="kitchen">Kitchen & Home</option>
            <option value="electronics">Electronics</option>
            <option value="health">Health & Fitness</option>
            <option value="beauty">Beauty</option>
            <option value="fashion">Fashion</option>
            <option value="books">Books</option>
          </select>
        </div>

        <button class="btn btn-success" onclick="addProduct()">
          ✅ Add Product to Website
        </button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 20px; color: #333;">📦 Current Products</h2>
      <div id="productsList" class="products-list">
        <p style="color: #888; text-align: center;">Loading products...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000';
    let currentProduct = null;

    // Load products on page load
    loadProducts();

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'block';
      setTimeout(() => { alert.style.display = 'none'; }, 5000);
    }

    async function scrapeProduct() {
      const url = document.getElementById('amazonUrl').value.trim();
      if (!url) {
        showAlert('Please enter an Amazon product URL', 'error');
        return;
      }

      const btn = document.getElementById('scrapeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Scraping...';

      try {
        const res = await fetch(`${API_BASE}/api/scrape`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.error) {
          showAlert(data.error, 'error');
        } else {
          currentProduct = data.product;
          displayPreview(currentProduct);
          showAlert('Product data fetched successfully!', 'success');
        }
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Fetch Product Data';
      }
    }

    function displayPreview(product) {
      document.getElementById('previewImg').src = product.image || 'https://via.placeholder.com/200';
      document.getElementById('previewTitle').textContent = product.title;
      document.getElementById('previewPrice').textContent = product.price;
      document.getElementById('previewRating').textContent = `⭐ ${product.rating} (${product.reviews} reviews)`;
      document.getElementById('previewAsin').textContent = product.asin;
      document.getElementById('category').value = product.category || 'featured';
      document.getElementById('preview').style.display = 'block';
    }

    async function addProduct() {
      if (!currentProduct) {
        showAlert('No product loaded', 'error');
        return;
      }

      const category = document.getElementById('category').value;
      currentProduct.category = category;

      try {
        const res = await fetch(`${API_BASE}/api/add_product`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product: currentProduct })
        });
        const data = await res.json();

        if (data.success) {
          showAlert(`Product added successfully! Total products: ${data.total}`, 'success');
          document.getElementById('preview').style.display = 'none';
          document.getElementById('amazonUrl').value = '';
          currentProduct = null;
          loadProducts();
        } else {
          showAlert(data.error || 'Failed to add product', 'error');
        }
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }

    async function loadProducts() {
      try {
        const res = await fetch(`${API_BASE}/api/products`);
        const products = await res.json();
        const list = document.getElementById('productsList');

        if (products.length === 0) {
          list.innerHTML = '<p style="color: #888; text-align: center;">No products yet. Add your first product!</p>';
        } else {
          list.innerHTML = products.map(p => `
            <div class="product-item">
              <img src="${p.image || 'https://via.placeholder.com/60'}" alt="${p.title}" />
              <div class="product-item-info">
                <h4>${p.title.substring(0, 60)}...</h4>
                <p>Category: ${p.category} | Price: ${p.price} | ASIN: ${p.asin}</p>
              </div>
              <button class="btn btn-danger" style="padding: 8px 16px; font-size: 13px;" onclick="deleteProduct('${p.id}')">
                🗑️ Delete
              </button>
            </div>
          `).join('');
        }
      } catch (err) {
        console.error('Failed to load products:', err);
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;

      try {
        const res = await fetch(`${API_BASE}/api/delete_product`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('Product deleted successfully!', 'success');
          loadProducts();
        }
      } catch (err) {
        showAlert('Error: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
