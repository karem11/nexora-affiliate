<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج - NEXORA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }
        .output h2 {
            margin-bottom: 15px;
            color: #667eea;
        }
        .output pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
        }
        .note {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 إضافة منتج جديد</h1>
        
        <div class="note">
            <strong>📌 ملحوظة:</strong> الصق رابط المنتج من Amazon.com واملأ البيانات يدوياً
        </div>

        <form id="productForm">
            <div class="form-group">
                <label>رابط المنتج من Amazon</label>
                <input type="url" id="productUrl" placeholder="https://www.amazon.com/dp/..." required>
            </div>

            <div class="form-group">
                <label>عنوان المنتج</label>
                <input type="text" id="productTitle" placeholder="مثال: Maxpower Pet Grooming Brush" required>
            </div>

            <div class="form-group">
                <label>السعر (بالدولار)</label>
                <input type="text" id="productPrice" placeholder="مثال: $9.99" required>
            </div>

            <div class="form-group">
                <label>التقييم</label>
                <input type="number" step="0.1" min="0" max="5" id="productRating" placeholder="4.6" required>
            </div>

            <div class="form-group">
                <label>عدد المراجعات</label>
                <input type="text" id="productReviews" placeholder="مثال: 56,256" required>
            </div>

            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="url" id="productImage" placeholder="https://m.media-amazon.com/images/..." required>
            </div>

            <div class="form-group">
                <label>الفئة</label>
                <select id="productCategory" required>
                    <option value="featured">Featured (الرئيسية)</option>
                    <option value="pets">Pets (حيوانات)</option>
                    <option value="beauty">Beauty (جمال)</option>
                    <option value="home">Home (منزل)</option>
                    <option value="tech">Tech (تكنولوجيا)</option>
                </select>
            </div>

            <button type="submit" class="btn">✨ توليد كود JSON</button>
        </form>

        <div class="output" id="output">
            <h2>📄 كود JSON - انسخه وأضفه لملف products.json</h2>
            <pre id="jsonOutput"></pre>
            <button class="btn" onclick="copyToClipboard()">📋 نسخ الكود</button>
        </div>
    </div>

    <script>
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const url = document.getElementById('productUrl').value;
            const title = document.getElementById('productTitle').value;
            const price = document.getElementById('productPrice').value;
            const rating = document.getElementById('productRating').value;
            const reviews = document.getElementById('productReviews').value;
            const image = document.getElementById('productImage').value;
            const category = document.getElementById('productCategory').value;
            
            // Extract ASIN or use timestamp
            let asinMatch = url.match(/\/dp\/([A-Z0-9]{10})/);
            let asin = asinMatch ? asinMatch[1] : '';
            
            // Generate affiliate URL
            let affiliateUrl = asin ? 
                `https://amzn.to/${asin}` : 
                url;
            
            // Generate ID and timestamp
            const now = new Date();
            const id = now.getFullYear().toString() + 
                      (now.getMonth() + 1).toString().padStart(2, '0') + 
                      now.getDate().toString().padStart(2, '0') + 
                      now.getHours().toString().padStart(2, '0') + 
                      now.getMinutes().toString().padStart(2, '0') + 
                      now.getSeconds().toString().padStart(2, '0');
            
            const addedAt = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            const product = {
                title: title,
                price: price,
                rating: rating,
                reviews: reviews,
                image: image,
                bullets: [
                    "ميزة رائعة 1",
                    "ميزة رائعة 2",
                    "ميزة رائعة 3"
                ],
                asin: asin,
                url: affiliateUrl,
                category: category,
                id: id,
                added_at: addedAt
            };
            
            const jsonOutput = JSON.stringify(product, null, 2);
            document.getElementById('jsonOutput').textContent = jsonOutput;
            document.getElementById('output').style.display = 'block';
            
            // Scroll to output
            document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
        });
        
        function copyToClipboard() {
            const text = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(text).then(function() {
                alert('✅ تم نسخ الكود!\\nالآن افتح ملف products.json وأضف هذا الكود.');
            }, function(err) {
                alert('❌ فشل النسخ. حاول تحديد النص يدوياً ونسخه.');
            });
        }
    </script>
</body>
</html>
